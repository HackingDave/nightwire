# Signal CLI REST API bridge for nightwire
#
# The bot runs natively (Python venv + systemd/launchd).
# This compose file only runs the Signal messaging bridge.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f signal-api

services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:1772646660-ci
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://127.0.0.1:8080/v1/about && curl -sf http://127.0.0.1:8080/v1/accounts"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
